<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - BajaRP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Staatliches&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="/imgs/logo.png" type="image/x-icon">
    <style>
        body.dashboard-page {
            background-color: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            padding-top: 80px; /* Space for Navbar */
        }

        /* Layout Layout */
        .dashboard-wrapper {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 30px;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(139, 0, 0, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            height: fit-content;
            display: none; /* Only show for admins */
        }

        .sidebar h3 {
            color: var(--gold-color);
            font-family: 'Staatliches', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 10px;
        }

        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 15px;
            color: var(--text-light);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.2);
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: var(--primary-color);
            color: #fff;
            transform: translateX(5px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .welcome-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-top: 4px solid var(--primary-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(139, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .welcome-card:hover {
            transform: translateY(-5px);
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
            object-fit: cover;
        }

        .welcome-text h1 {
            color: var(--gold-color);
            font-family: 'Staatliches', sans-serif;
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .welcome-text p {
            color: var(--text-light);
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Whitelist Panel */
        .admin-panel {
            display: none;
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid rgba(255, 87, 34, 0.2);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .admin-header h2 {
            font-family: 'Staatliches', sans-serif;
            color: var(--text-light);
            letter-spacing: 2px;
            font-size: 2rem;
        }

        /* Whitelist List */
        .wl-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .wl-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr auto;
            align-items: center;
            background: rgba(0,0,0,0.4);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .wl-row:hover {
            background: rgba(255, 87, 34, 0.1);
            border-color: var(--secondary-color);
            transform: translateX(5px);
        }

        .wl-row-name { font-weight: 600; color: var(--secondary-color); }
        .wl-row-roblox { color: var(--text-light); font-size: 0.9rem; }
        .wl-row-date { color: var(--text-color); font-size: 0.85rem; }
        .wl-row-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Modal Glassmorphism */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--secondary-color);
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }

        .modal-header h2 {
            font-family: 'Staatliches', sans-serif;
            color: var(--gold-color);
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .close-modal {
            background: none; border: none;
            color: var(--text-light);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        .close-modal:hover { color: var(--danger-color); }

        .modal-body {
            padding: 30px;
        }

        .wl-question {
            margin-bottom: 25px;
            padding: 25px;
            background: linear-gradient(145deg, rgba(30, 30, 30, 0.8), rgba(15, 15, 15, 0.9));
            border-radius: 12px;
            border-left: 5px solid var(--primary-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
        }
        .wl-question::before {
            content: "\f059";
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: -15px;
            right: 20px;
            font-size: 2rem;
            color: rgba(255, 87, 34, 0.15);
        }
        .wl-question strong { 
            color: var(--secondary-color); 
            display: block; 
            margin-bottom: 12px; 
            font-size: 1.15rem; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .wl-question p { 
            color: #dcdcdc; 
            line-height: 1.7; 
            font-size: 1.05rem;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.2);
        }

        .btn-accept, .btn-deny {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            font-size: 1.1rem;
        }
        .btn-accept { background: var(--success-color); color: #fff; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3); }
        .btn-accept:hover { background: #27ae60; transform: translateY(-2px); }
        .btn-deny { background: var(--danger-color); color: #fff; box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3); }
        .btn-deny:hover { background: #660000; transform: translateY(-2px); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-color); }
        .empty-state i { font-size: 3rem; margin-bottom: 15px; color: var(--primary-color); }

        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center;
            z-index: 3000; display: none; color: var(--secondary-color); font-size: 2.5rem;
            flex-direction: column; gap: 15px;
        }

        /* Responsive */
        @media(max-width: 900px) {
            .dashboard-wrapper { flex-direction: column; }
            .sidebar { width: 100%; }
            .welcome-card { flex-direction: column; text-align: center; }
            .wl-row { grid-template-columns: 1fr; gap: 10px; text-align: center; }
            .wl-row-btn { width: 100%; }
        }
    </style>
</head>

<body class="dashboard-page">

    <!-- Navbar Global -->
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo-link">
                <img src="/imgs/logo.png"
                    alt="BajaRP Logo" class="logo">
            </a>

            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>

            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Inicio</a></li>
                <li><a href="normativas.html"><i class="fas fa-book"></i> Normativas</a></li>
                <li><a href="beneficios.html"><i class="fas fa-star"></i> Beneficios</a></li>
                <li class="mobile-only"><a href="/auth/discord" class="nav-cta"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</a></li>
            </ul>

            <div class="nav-actions">
                <a href="/auth/discord" class="nav-cta"><i class="fas fa-sign-in-alt"></i> Iniciar Sesión</a>
            </div>
        </div>
    </nav>

    <div class="loading-overlay" id="loadingOverlay">
        <i class="fas fa-circle-notch fa-spin"></i>
        <p style="font-size: 1.2rem; margin: 0; font-family: 'Poppins', sans-serif; color: var(--text-light);">Procesando...</p>
    </div>

    <!-- Modal de Whitelist -->
    <div class="modal-overlay" id="wlModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Revisión de Whitelist</h2>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Se llena con JS -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Botones llenados con JS -->
            </div>
        </div>
    </div>

    <div class="dashboard-wrapper">
        
        <!-- Sidebar -->
        <div class="sidebar" id="adminSidebar">
            <h3>Administración</h3>
            <ul class="sidebar-menu">
                <li>
                    <a href="#" class="active" onclick="showPanel('whitelistPanel')">
                        <i class="fas fa-clipboard-list"></i> Formularios (Whitelist)
                    </a>
                </li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Tarjeta de Bienvenida -->
            <div class="welcome-card">
                <img id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" class="profile-pic">
                <div class="welcome-text">
                    <h1>¡Bienvenido, <span id="userName">Ciudadano</span>!</h1>
                    <p><i class="fas fa-briefcase"></i> Trabajo: <span style="color: var(--secondary-color);">Default</span></p>
                </div>
            </div>

            <!-- Panel de Administración de Whitelist -->
            <div class="admin-panel" id="whitelistPanel">
                <div class="admin-header">
                    <h2><i class="fas fa-clipboard-list"></i> Solicitudes Pendientes</h2>
                    <button class="join-btn" onclick="loadWhitelists()"><i class="fas fa-sync-alt"></i> Refrescar</button>
                </div>

                <div class="wl-list" id="whitelistContainer">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Cargando solicitudes...</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        let currentWhitelists = [];

        document.addEventListener("DOMContentLoaded", async () => {
            const userNameSpan = document.getElementById("userName");
            const userAvatar = document.getElementById("userAvatar");
            const adminSidebar = document.getElementById("adminSidebar");
            const whitelistPanel = document.getElementById("whitelistPanel");
            
            // Cargar info del usuario
            try {
                const res = await fetch('/api/user_info');
                if (!res.ok) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                
                // Redirigir a whitelist si no es administrador y no está verificado
                if (!data.is_admin && !data.is_verified) {
                    window.location.href = '/whitelist.html';
                    return;
                }

                userNameSpan.textContent = data.discord_name;
                userAvatar.src = data.avatar_url;
                
                // Mostrar panel de administración si tiene el rol
                if (data.is_admin) {
                    adminSidebar.style.display = "block";
                    whitelistPanel.style.display = "block";
                    loadWhitelists();
                }

            } catch (error) {
                console.error("Error obteniendo usuario", error);
            }
        });

        // Función para cargar la lista en tabla/filas
        async function loadWhitelists() {
            const container = document.getElementById("whitelistContainer");
            container.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando solicitudes...</p></div>`;

            try {
                const res = await fetch('/api/pending_whitelists');
                const data = await res.json();

                if (!res.ok) {
                    container.innerHTML = `<div class="empty-state" style="color: var(--danger-color);"><i class="fas fa-exclamation-circle"></i><p>${data.error}</p></div>`;
                    return;
                }

                currentWhitelists = data.whitelists;

                if (currentWhitelists.length === 0) {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle" style="color: var(--success-color);"></i><p>No hay formularios pendientes. ¡Todo al día!</p></div>`;
                    return;
                }

                container.innerHTML = ""; // Limpiar
                
                currentWhitelists.forEach((wl, index) => {
                    const date = new Date(wl.created_at).toLocaleString('es-ES', { dateStyle: 'short', timeStyle: 'short' });
                    
                    const row = document.createElement("div");
                    row.className = "wl-row";
                    row.onclick = () => openModal(index);
                    row.innerHTML = `
                        <div class="wl-row-name"><i class="fab fa-discord"></i> ${wl.discord_name}</div>
                        <div class="wl-row-roblox"><i class="fas fa-gamepad"></i> ${wl.roblox_name}</div>
                        <div class="wl-row-date"><i class="far fa-clock"></i> ${date}</div>
                        <button class="wl-row-btn">Revisar <i class="fas fa-arrow-right"></i></button>
                    `;
                    container.appendChild(row);
                });

            } catch (error) {
                container.innerHTML = `<div class="empty-state" style="color: var(--danger-color);"><i class="fas fa-wifi"></i><p>Error de conexión.</p></div>`;
            }
        }

        // Manejo del Modal
        function openModal(index) {
            const wl = currentWhitelists[index];
            if (!wl) return;

            const modalBody = document.getElementById("modalBody");
            const modalFooter = document.getElementById("modalFooter");
            
            modalBody.innerHTML = `
                <div style="margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                    <h3 style="color: var(--secondary-color); font-size: 1.5rem; margin-bottom: 5px;"><i class="fab fa-discord"></i> ${wl.discord_name}</h3>
                    <p style="color: var(--text-light);"><i class="fas fa-gamepad"></i> Roblox: <strong>${wl.roblox_name}</strong></p>
                </div>
                
                <div class="wl-question">
                    <strong>1. ¿Qué es el Roleplay y qué entiendes por Valorar Vida (NVL)?</strong>
                    <p>${wl.q1}</p>
                </div>
                <div class="wl-question">
                    <strong>2. Menciona 3 normativas básicas y explícalas.</strong>
                    <p>${wl.q2}</p>
                </div>
                <div class="wl-question">
                    <strong>3. ¿Por qué te gustaría formar parte de la comunidad?</strong>
                    <p>${wl.q3}</p>
                </div>
                <div class="wl-question">
                    <strong>4. ¿Qué significa RDM (Random Death Match)?</strong>
                    <p style="color: var(--gold-color); font-weight: bold;">${wl.q4}</p>
                </div>
                <div class="wl-question">
                    <strong>5. Si te asaltan 3 personas armadas y tú solo tienes una pistola, ¿qué haces?</strong>
                    <p style="color: var(--gold-color); font-weight: bold;">${wl.q5}</p>
                </div>
            `;

            modalFooter.innerHTML = `
                <button class="btn-accept" onclick="resolveWhitelist(${wl.id}, 'accept')"><i class="fas fa-check"></i> Aceptar Solicitud</button>
                <button class="btn-deny" onclick="resolveWhitelist(${wl.id}, 'deny')"><i class="fas fa-times"></i> Denegar Solicitud</button>
            `;

            document.getElementById("wlModal").style.display = "flex";
        }

        function closeModal() {
            document.getElementById("wlModal").style.display = "none";
        }

        // Cierra modal si hacen clic fuera de la caja
        window.onclick = function(event) {
            const modal = document.getElementById("wlModal");
            if (event.target == modal) {
                closeModal();
            }
        }

        // Función para aceptar/denegar
        async function resolveWhitelist(id, action) {
            let reason = "";
            
            if (action === 'accept') {
                if (!confirm('¿Estás seguro de ACEPTAR este formulario? El usuario recibirá el rol de ciudadano y un MD.')) return;
            } else if (action === 'deny') {
                reason = prompt('Estás a punto de DENEGAR la solicitud.\nEscribe la razón (se le enviará por MD al usuario):');
                if (reason === null) return;
                if (reason.trim() === '') {
                    alert('Debes escribir una razón para denegar la solicitud.');
                    return;
                }
            }

            closeModal();
            const loading = document.getElementById("loadingOverlay");
            loading.style.display = "flex";

            try {
                const res = await fetch('/api/resolve_whitelist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, action, reason })
                });

                const data = await res.json();
                loading.style.display = "none";

                if (res.ok) {
                    alert("Exito: " + data.message);
                    loadWhitelists(); // Recargar la lista
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                loading.style.display = "none";
                alert("Ocurrió un error al procesar la solicitud.");
            }
        }
    </script>
</body>
</html>
